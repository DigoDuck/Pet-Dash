name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: petdash
          POSTGRES_PASSWORD: petdash
          POSTGRES_DB: petdash
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U petdash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://petdash:petdash@localhost:5432/petdash
      # 32+ bytes: chaves menores disparam InsecureKeyLengthWarning no HMAC do JWT.
      SECRET_KEY: ci-only-secret-key-with-32-plus-bytes-0000
      DEBUG: "false"
      # O test client fala http; sem isto o SECURE_SSL_REDIRECT do bloco de
      # produção (settings, DEBUG=false) devolve 301 para todos os testes de API.
      SECURE_SSL_REDIRECT: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      # Com DEBUG=false o {% static %} consulta o manifest do WhiteNoise;
      # sem collectstatic o smoke do admin falha (mesmo passo do build na Railway).
      - run: python manage.py collectstatic --noinput
      - run: pytest -v
